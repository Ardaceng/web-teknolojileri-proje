    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="contact-paper shadow-sm">
                    <h1 class="section-title text-center mb-4">bana ulaşın ✉️</h1>

                    <form id="contactForm" action="php/formislem.php" method="POST">
                        <div class="row g-3">
                            <!-- Ad Soyad -->
                            <div class="col-md-6">
                                <label for="ad" class="form-label">Adınız Soyadınız</label>
                                <input type="text" class="form-control" id="ad" name="ad" placeholder="Ali Arda Dilek">
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <label for="email" class="form-label">E-posta Adresiniz</label>
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="ornek@mail.com">
                            </div>

                            <!-- Telefon -->
                            <div class="col-md-6">
                                <label for="tel" class="form-label">Telefon Numaranız</label>
                                <input type="tel" class="form-control" id="tel" name="tel" placeholder="05XX XXX XX XX">
                            </div>

                            <!-- Konu (Select) -->
                            <div class="col-md-6">
                                <label for="konu" class="form-label">Konu</label>
                                <select class="form-select" id="konu" name="konu">
                                    <option value="" selected disabled>Bir konu seçin...</option>
                                    <option value="Genel">Genel İletişim</option>
                                    <option value="Geri Bildirim">Geri Bildirim</option>
                                    <option value="Soru">Soru / Öneri</option>
                                    <option value="Diger">Diğer</option>
                                </select>
                            </div>

                            <!-- Cinsiyet (Radio) -->
                            <div class="col-md-12 my-3">
                                <label class="form-label d-block">Cinsiyet</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="cinsiyet" id="erkek"
                                        value="Erkek">
                                    <label class="form-check-label" for="erkek">Erkek</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="cinsiyet" id="kadin"
                                        value="Kadın">
                                    <label class="form-check-label" for="kadin">Kadın</label>
                                </div>
                            </div>

                            <!-- İlgi Alanları (Checkbox) -->
                            <div class="col-md-12 mb-3">
                                <label class="form-label d-block">İlgi Alanlarınız</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" name="ilgi[]" id="ilgi_voleybol"
                                        value="Voleybol">
                                    <label class="form-check-label" for="ilgi_voleybol">Voleybol</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" name="ilgi[]" id="ilgi_satranc"
                                        value="Satranç">
                                    <label class="form-check-label" for="ilgi_satranc">Satranç</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" name="ilgi[]" id="ilgi_seyahat"
                                        value="Seyahat">
                                    <label class="form-check-label" for="ilgi_seyahat">Seyahat</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" name="ilgi[]" id="ilgi_yazilim"
                                        value="Yazılım">
                                    <label class="form-check-label" for="ilgi_yazilim">Yazılım</label>
                                </div>
                            </div>

                            <!-- Mesaj (Textarea) -->
                            <div class="col-12">
                                <label for="mesaj" class="form-label">Mesajınız</label>
                                <textarea class="form-control" id="mesaj" name="mesaj" rows="4"
                                    placeholder="Buraya yazın..."></textarea>
                            </div>

                            <!-- Buttons -->
                            <div class="col-12 mt-4 d-flex flex-wrap gap-3 justify-content-center">
                                <!-- Vanilla JS Control -->
                                <button type="button" class="btn btn-brown-outline" onclick="vanillaCheck()">
                                    Vanilla JS Kontrol 🍦
                                </button>

                                <!-- Vue.js Control (Hidden/Visible handled via JS or just ID) -->
                                <div id="v-app">
                                    <button type="button" class="btn btn-vue-outline" @click="vueCheck">
                                        Vue.js Kontrol 🟢
                                    </button>
                                </div>

                                <!-- Actual Submit (Disabled or just separate) -->
                                <button type="submit" class="btn btn-brown px-5">Gönder 📮</button>
                                <button type="reset" class="btn btn-outline-secondary">Temizle</button>
                            </div>

                        </div>
                    </form>
                </div>
            </div>
        </div>
