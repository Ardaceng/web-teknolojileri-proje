                </ul>
            </div>
        </div>
    </nav>

    <!-- ANA İÇERİK -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9">

                <h1 class="page-title text-center">bana ulaşın ✉️</h1>
                <p class="page-subtitle text-center">Aşağıdaki formu doldurarak benimle iletişime geçebilirsiniz.</p>

                <div class="form-card">
                    <form id="contactForm" action="php/formislem.php" method="POST">

                        <!-- Ad Soyad -->
                        <div class="mb-3">
                            <label for="ad" class="field-label">Adınız Soyadınız</label>
                            <input type="text" class="field-input" id="ad" name="ad" placeholder="Ali Arda Dilek">
                        </div>

                        <!-- E-posta -->
                        <div class="mb-3">
                            <label for="email" class="field-label">E-posta Adresiniz</label>
                            <input type="email" class="field-input" id="email" name="email"
                                placeholder="ornek@mail.com">
                        </div>

                        <!-- Telefon -->
                        <div class="mb-3">
                            <label for="tel" class="field-label">Telefon Numaranız</label>
                            <input type="tel" class="field-input" id="tel" name="tel" placeholder="05XX XXX XX XX">
                        </div>

                        <!-- Konu -->
                        <div class="mb-3">
                            <label for="konu" class="field-label">Konu</label>
                            <select class="field-input" id="konu" name="konu">
                                <option value="" selected disabled>Bir konu seçin...</option>
                                <option value="Genel">Genel İletişim</option>
                                <option value="Geri Bildirim">Geri Bildirim</option>
                                <option value="Soru">Soru / Öneri</option>
                                <option value="Diger">Diğer</option>
                            </select>
                        </div>

                        <!-- Cinsiyet (Radio) -->
                        <div class="mb-3">
                            <label class="field-label d-block">Cinsiyet</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek">
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın">
                                <label class="form-check-label" for="kadin">Kadın</label>
                            </div>
                        </div>

                        <!-- İlgi Alanları (Checkbox) -->
                        <div class="mb-3">
                            <label class="field-label d-block">İlgi Alanlarınız</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="ilgi[]" id="ilgi_voleybol"
                                    value="Voleybol">
                                <label class="form-check-label" for="ilgi_voleybol">Voleybol</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="ilgi[]" id="ilgi_satranc"
                                    value="Satranç">
                                <label class="form-check-label" for="ilgi_satranc">Satranç</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="ilgi[]" id="ilgi_seyahat"
                                    value="Seyahat">
                                <label class="form-check-label" for="ilgi_seyahat">Seyahat</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="ilgi[]" id="ilgi_yazilim"
                                    value="Yazılım">
                                <label class="form-check-label" for="ilgi_yazilim">Yazılım</label>
                            </div>
                        </div>

                        <!-- Mesaj -->
                        <div class="mb-4">
                            <label for="mesaj" class="field-label">Mesajınız</label>
                            <textarea class="field-input" id="mesaj" name="mesaj" rows="4"
                                placeholder="Buraya yazın..."></textarea>
                        </div>

                        <!-- Butonlar -->
                        <div class="d-flex flex-wrap gap-2 justify-content-center">
                            <button type="button" class="btn-vanilla" onclick="vanillaCheck()">Vanilla JS Kontrol
                                🍦</button>
                            <div id="v-app">
                                <button type="button" class="btn-vue" @click="vueCheck">Vue.js Kontrol 🟢</button>
                            </div>
                            <button type="submit" class="btn-send">Gönder 📮</button>
                            <button type="reset" class="btn-reset">Temizle</button>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="text-center py-3">✦ ali arda dilek · sakarya üniversitesi bilgisayar mühendisliği ✦</footer>

</body>
